name: Expo West 2026 Exhibitor Scraper

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run scraper from"
        required: false
        default: "claude/fix-web-scraper-MiD8x"
      limit:
        description: "Max exhibitors to scrape (0 = all)"
        required: false
        default: "0"
      reset:
        description: "Clear checkpoints and start fresh (true/false)"
        required: false
        default: "false"

jobs:
  scrape:
    name: Scrape Exhibitor Data
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max (large show ~2,000+ exhibitors)

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install Python dependencies ────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Fix Ubuntu 24.04 libasound2 package rename ────────────────────────
      #    Ubuntu 24.04 renamed libasound2 → libasound2t64; install the alias
      #    so Playwright's --with-deps does not fail on the old package name.
      - name: Install Ubuntu 24.04 Playwright system prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 \
            libgbm1 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xvfb

      # ── 5. Install Playwright browsers ────────────────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 6. Run the scraper ────────────────────────────────────────────────────
      - name: Run scraper
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.reset }}" = "true" ]; then
            ARGS="$ARGS --reset"
          fi
          if [ "${{ github.event.inputs.limit }}" != "0" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          python scraper.py $ARGS

      # ── 7. Upload output Excel files as artifact ──────────────────────────────
      - name: Upload output files
        if: always()   # upload even if scraper exited with an error (partial data)
        uses: actions/upload-artifact@v4
        with:
          name: expo-west-2026-data
          path: output/
          retention-days: 30
          if-no-files-found: warn

      # ── 8. Upload logs + screenshots on failure ────────────────────────────────
      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-${{ github.run_number }}
          path: |
            logs/
            screenshots/
            checkpoints/
          retention-days: 7
          if-no-files-found: ignore
